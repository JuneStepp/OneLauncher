- module-name: "onelauncher"
  dlls:
    - from_filenames:
        relative_path: "external"
        prefixes:
          - "innoextract"
        executable: "yes"
  import-hacks:
    - package-system-dlls: "yes"
# See <https://github.com/sissaschool/elementpath/issues/102>.
- module-name: "elementpath.datatypes.any_types"
  anti-bloat:
  - description: "remove docstring dependency"
    replacements_plain:
      "ver = ver + ' '": "ver = ver + ' ' if type(ver) is str else ' '"
    when: "no_docstrings"
